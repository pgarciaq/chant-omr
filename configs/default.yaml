# ChantOMR training configuration

data:
  gabc_dir: data/gregobase/
  rendered_dir: data/rendered/
  tokenizer_dir: data/tokenizer/
  train_split: 0.9
  val_split: 0.1
  target_width: 1050       # scale to this width; preserve aspect ratio
  max_height: 1600         # cap height after scaling (no portrait letterbox)
  augment: true            # domain augmentation (#30) — training set only
  texture_dir: data/textures   # real parchment patches for texture overlay
  num_workers: 0           # 0 for container safety (/dev/shm); set to 4 on bare metal or
                           # VMs with sufficient shared memory. On containers, first run:
                           #   mount -o remount,size=2G /dev/shm

model:
  encoder_variant: convnextv2_tiny
  encoder_pretrained: true
  projector_hidden: 768
  d_model: 512
  n_layers: 8
  n_heads: 8
  d_ff: 1024
  dropout: 0.1
  max_seq_len: 2048
  vocab_size: 2048

training:
  epochs: 50
  batch_size: 2
  learning_rate: 1.0e-4
  weight_decay: 0.05
  warmup_fraction: 0.05
  gradient_clip: 1.0
  precision: bf16-mixed  # bf16 on A100/H100, 16-mixed on older GPUs
  accumulate_grad_batches: 4  # effective batch size = batch_size * 4 = 8

  # Checkpointing
  checkpoint_dir: checkpoints/
  save_top_k: 3
  monitor: val_loss

  # Early stopping
  early_stopping:
    enabled: true
    patience: 10         # stop after 10 epochs with no val_loss improvement
    min_delta: 0.001     # minimum change to qualify as improvement

inference:
  beam_width: 3
  repetition_penalty: 1.1
  max_length: 2048
  grammar_constrained: false  # balanced-paren mask (#37); opt-in
  grammar_penalty: -inf       # -inf = hard mask; finite (e.g. -10.0) = soft penalty (#57)
